<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel schrijven — PROTOM Admin</title>
    <link rel="icon" href="../ProTom.svg" type="image/svg+xml">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Barlow', sans-serif; background: #f0f4fb; color: #1a2540; -webkit-font-smoothing: antialiased; }

        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 240px;
            background: #1a3060; display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .sidebar-logo img { height: 40px; width: auto; }
        .sidebar-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.35); padding: 24px 20px 8px; }
        .sidebar-nav { list-style: none; padding: 0 12px; flex: 1; }
        .sidebar-nav li a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; color: rgba(255,255,255,0.65); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
        .sidebar-nav li a:hover, .sidebar-nav li a.active { background: rgba(255,255,255,0.1); color: #fff; }
        .sidebar-nav li a i { width: 16px; text-align: center; }
        .sidebar-bottom { padding: 16px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
        .btn-logout { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border-radius: 8px; background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.5); font-size: 0.88rem; font-family: 'Barlow', sans-serif; transition: all 0.2s; }
        .btn-logout:hover { background: rgba(255,0,0,0.1); color: #f87171; }

        .main { margin-left: 240px; min-height: 100vh; }
        .topbar { background: white; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(26,48,96,0.08); box-shadow: 0 1px 8px rgba(0,0,0,0.05); gap: 16px; }
        .topbar h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 800; text-transform: uppercase; color: #1a3060; }
        .topbar-actions { display: flex; gap: 10px; flex-shrink: 0; }

        .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: 7px; border: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.88rem; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .btn-draft { background: #f0f4fb; color: #1a3060; border: 1.5px solid rgba(26,48,96,0.15); }
        .btn-draft:hover { background: #e2e8f0; }
        .btn-publish { background: linear-gradient(135deg, #4d8ae8, #1a3060); color: white; box-shadow: 0 3px 12px rgba(39,87,184,0.3); }
        .btn-publish:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(39,87,184,0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

        .content { padding: 32px; display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }

        /* Main editor area */
        .editor-main { display: flex; flex-direction: column; gap: 20px; }
        .field-wrap { background: white; border-radius: 12px; padding: 24px; border: 1px solid rgba(26,48,96,0.07); }
        label { display: block; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: #8a9ab8; margin-bottom: 8px; }
        input[type="text"], input[type="url"], textarea {
            width: 100%; background: #f8fafc; border: 1.5px solid rgba(26,48,96,0.1); border-radius: 8px;
            padding: 11px 14px; font-family: 'Barlow', sans-serif; font-size: 0.9rem; color: #1a2540;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus, input[type="url"]:focus, textarea:focus {
            border-color: #2757b8; box-shadow: 0 0 0 3px rgba(39,87,184,0.1); background: white;
        }
        #titleInput { font-size: 1.3rem; font-weight: 600; border: none; background: transparent; padding: 0; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.01em; }
        #titleInput:focus { box-shadow: none; background: transparent; border: none; }
        #titleInput::placeholder { color: #c0cce0; }

        /* Quill editor */
        .ql-container { font-family: 'Barlow', sans-serif !important; font-size: 0.95rem !important; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
        .ql-toolbar { border-top-left-radius: 8px; border-top-right-radius: 8px; border-color: rgba(26,48,96,0.1) !important; }
        .ql-container { border-color: rgba(26,48,96,0.1) !important; min-height: 300px; }
        .ql-editor { min-height: 300px; }

        /* Sidebar fields */
        .editor-side { display: flex; flex-direction: column; gap: 20px; }
        .side-card { background: white; border-radius: 12px; padding: 22px; border: 1px solid rgba(26,48,96,0.07); }
        .side-card h3 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; color: #1a3060; letter-spacing: 0.06em; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid rgba(26,48,96,0.07); }
        .slug-wrap { position: relative; }
        .slug-prefix { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 0.82rem; color: #a0aec0; pointer-events: none; }
        #slugInput { padding-left: 68px; }
        .hint { font-size: 0.75rem; color: #a0aec0; margin-top: 6px; }
        textarea { resize: vertical; min-height: 90px; }
        .cover-preview { margin-top: 12px; border-radius: 8px; overflow: hidden; height: 130px; background: #f0f4fb; display: none; }
        .cover-preview img { width: 100%; height: 100%; object-fit: cover; }

        .toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            background: #1a3060; color: white; padding: 14px 22px;
            border-radius: 10px; font-size: 0.88rem; font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transform: translateY(80px); opacity: 0;
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
            display: flex; align-items: center; gap: 10px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: #16a34a; }
        .toast.error   { background: #dc2626; }

        @media (max-width: 900px) {
            .content { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo"><img src="../ProTom.svg" alt="PROTOM"></div>
    <div class="sidebar-label">Beheer</div>
    <ul class="sidebar-nav">
        <li><a href="index.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
        <li><a href="editor.html" class="active"><i class="fa-solid fa-pen-to-square"></i> Nieuw artikel</a></li>
        <li><a href="../blog.html" target="_blank"><i class="fa-solid fa-globe"></i> Blog bekijken</a></li>
        <li><a href="/"><i class="fa-solid fa-house"></i> Naar de website</a></li>
    </ul>
    <div class="sidebar-bottom">
        <button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Uitloggen</button>
    </div>
</aside>

<div class="main">
    <div class="topbar">
        <h1 id="pageTitle">Nieuw artikel</h1>
        <div class="topbar-actions">
            <button class="btn btn-draft" id="saveDraftBtn"><i class="fa-regular fa-floppy-disk"></i> Opslaan als concept</button>
            <button class="btn btn-publish" id="publishBtn"><i class="fa-solid fa-globe"></i> Publiceren</button>
        </div>
    </div>

    <div class="content">
        <div class="editor-main">
            <div class="field-wrap">
                <input type="text" id="titleInput" placeholder="Typ hier de titel van je artikel..." maxlength="200">
            </div>
            <div class="field-wrap">
                <label>Inhoud</label>
                <div id="quillEditor"></div>
            </div>
        </div>

        <div class="editor-side">
            <div class="side-card">
                <h3>Instellingen</h3>
                <label>URL slug</label>
                <div class="slug-wrap">
                    <span class="slug-prefix">/blog/</span>
                    <input type="text" id="slugInput" placeholder="mijn-artikel">
                </div>
                <p class="hint">Wordt automatisch ingevuld vanuit de titel</p>
            </div>

            <div class="side-card">
                <h3>Samenvatting</h3>
                <label>Korte omschrijving</label>
                <textarea id="excerptInput" placeholder="Korte beschrijving die op de blogpagina getoond wordt..."></textarea>
            </div>

            <div class="side-card">
                <h3>Omslagafbeelding</h3>
                <label>Afbeelding URL</label>
                <input type="url" id="coverInput" placeholder="https://...">
                <div class="cover-preview" id="coverPreview">
                    <img id="coverImg" src="" alt="">
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const { createClient } = window.supabase;
    const sb = createClient(
        'https://hbzcgivqtgjuwyjguleq.supabase.co',
        'sb_publishable_mxWsNZyZieJeGFyev_Isvw_Tna758b_'
    );

    let editId = null;

    const quill = new Quill('#quillEditor', {
        theme: 'snow',
        placeholder: 'Schrijf hier je artikel...',
        modules: {
            toolbar: [
                [{ header: [2, 3, false] }],
                ['bold', 'italic', 'underline'],
                [{ list: 'ordered' }, { list: 'bullet' }],
                ['blockquote', 'link', 'image'],
                ['clean']
            ]
        }
    });

    // Auto-generate slug from title
    document.getElementById('titleInput').addEventListener('input', (e) => {
        if (!editId) { // Only auto-gen for new posts
            document.getElementById('slugInput').value = slugify(e.target.value);
        }
    });

    // Cover image preview
    document.getElementById('coverInput').addEventListener('input', (e) => {
        const url = e.target.value.trim();
        const preview = document.getElementById('coverPreview');
        const img     = document.getElementById('coverImg');
        if (url) {
            img.src = url;
            preview.style.display = 'block';
        } else {
            preview.style.display = 'none';
        }
    });

    function slugify(text) {
        return text.toLowerCase()
            .replace(/[àáâãäå]/g, 'a').replace(/[èéêë]/g, 'e')
            .replace(/[ìíîï]/g, 'i').replace(/[òóôõö]/g, 'o')
            .replace(/[ùúûü]/g, 'u').replace(/[ñ]/g, 'n')
            .replace(/[^a-z0-9\s-]/g, '')
            .replace(/\s+/g, '-').replace(/-+/g, '-')
            .replace(/^-|-$/g, '').substring(0, 80);
    }

    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast ' + type + ' show';
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function save(publish) {
        const title   = document.getElementById('titleInput').value.trim();
        const slug    = document.getElementById('slugInput').value.trim();
        const excerpt = document.getElementById('excerptInput').value.trim();
        const cover   = document.getElementById('coverInput').value.trim();
        const content = quill.root.innerHTML;

        if (!title) { showToast('Vul een titel in', 'error'); return; }
        if (!slug)  { showToast('Vul een slug in', 'error'); return; }

        const draftBtn   = document.getElementById('saveDraftBtn');
        const publishBtn = document.getElementById('publishBtn');
        draftBtn.disabled = publishBtn.disabled = true;

        const payload = { title, slug, excerpt, cover_image: cover, content, published: publish, updated_at: new Date().toISOString() };

        let error;
        if (editId) {
            ({ error } = await sb.from('blog_posts').update(payload).eq('id', editId));
        } else {
            const { data, error: e } = await sb.from('blog_posts').insert(payload).select().single();
            error = e;
            if (data) { editId = data.id; history.replaceState(null, '', '?id=' + editId); document.getElementById('pageTitle').textContent = 'Artikel bewerken'; }
        }

        draftBtn.disabled = publishBtn.disabled = false;

        if (error) {
            showToast('Fout bij opslaan: ' + error.message, 'error');
        } else {
            showToast(publish ? '✓ Artikel gepubliceerd!' : '✓ Concept opgeslagen', 'success');
        }
    }

    document.getElementById('saveDraftBtn').addEventListener('click', () => save(false));
    document.getElementById('publishBtn').addEventListener('click',   () => save(true));
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await sb.auth.signOut(); window.location.href = '/admin/login.html';
    });

    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = '/admin/login.html'; return; }

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) return;

        editId = id;
        document.getElementById('pageTitle').textContent = 'Artikel bewerken';

        const { data: post } = await sb.from('blog_posts').select('*').eq('id', id).single();
        if (!post) return;

        document.getElementById('titleInput').value   = post.title;
        document.getElementById('slugInput').value    = post.slug;
        document.getElementById('excerptInput').value = post.excerpt || '';
        document.getElementById('coverInput').value   = post.cover_image || '';
        quill.root.innerHTML = post.content || '';

        if (post.cover_image) {
            document.getElementById('coverImg').src = post.cover_image;
            document.getElementById('coverPreview').style.display = 'block';
        }
        if (post.published) {
            document.getElementById('publishBtn').textContent = '✓ Gepubliceerd';
        }
    }

    init();
</script>
</body>
</html>
