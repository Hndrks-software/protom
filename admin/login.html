<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen — PROTOM Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Barlow', sans-serif;
            background: linear-gradient(135deg, #4d8ae8 0%, #1a3060 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background: white;
            border-radius: 18px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.22);
        }
        .logo-wrap {
            text-align: center;
            margin-bottom: 36px;
        }
        .logo-wrap img { height: 52px; width: auto; }
        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            text-transform: uppercase;
            color: #1a3060;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            font-size: 0.88rem;
            color: #8a9ab8;
            margin-bottom: 32px;
        }
        label {
            display: block;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #1a3060;
            margin-bottom: 7px;
        }
        input {
            width: 100%;
            background: #f0f4fb;
            border: 1.5px solid rgba(26,48,96,0.13);
            border-radius: 8px;
            padding: 12px 15px;
            font-family: 'Barlow', sans-serif;
            font-size: 0.9rem;
            color: #1a2540;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 18px;
        }
        input:focus {
            border-color: #2757b8;
            box-shadow: 0 0 0 3px rgba(39,87,184,0.1);
            background: #fff;
        }
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #4d8ae8, #1a3060);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(39,87,184,0.35);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 4px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(39,87,184,0.5); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.85rem;
            margin-bottom: 18px;
            display: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.83rem;
            color: #8a9ab8;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #2757b8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-wrap">
            <img src="../ProTom.svg" alt="PROTOM">
        </div>
        <h1>Admin inloggen</h1>
        <p class="subtitle">Toegang tot het beheerpaneel</p>

        <div class="error" id="errorMsg"></div>

        <form id="loginForm">
            <label for="email">E-mailadres</label>
            <input type="email" id="email" placeholder="admin@pro-tom.com" required autocomplete="email">

            <label for="password">Wachtwoord</label>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">

            <button type="submit" class="btn-login" id="loginBtn">Inloggen</button>
        </form>

        <a href="/" class="back-link">← Terug naar de website</a>
    </div>

    <script>
        const { createClient } = window.supabase;
        const sb = createClient(
            'https://hbzcgivqtgjuwyjguleq.supabase.co',
            'sb_publishable_mxWsNZyZieJeGFyev_Isvw_Tna758b_'
        );

        // Al ingelogd? Doorsturen
        sb.auth.getSession().then(({ data }) => {
            if (data.session) window.location.href = '/admin/index.html';
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn   = document.getElementById('loginBtn');
            const error = document.getElementById('errorMsg');
            const email = document.getElementById('email').value;
            const pass  = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Bezig...';
            error.style.display = 'none';

            const { error: err } = await sb.auth.signInWithPassword({ email, password: pass });

            if (err) {
                error.textContent = 'Onjuist e-mailadres of wachtwoord.';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Inloggen';
            } else {
                window.location.href = '/admin/index.html';
            }
        });
    </script>
</body>
</html>
