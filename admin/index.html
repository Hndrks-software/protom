<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — PROTOM Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Barlow', sans-serif; background: #f0f4fb; color: #1a2540; -webkit-font-smoothing: antialiased; }

        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 240px;
            background: #1a3060;
            display: flex; flex-direction: column;
            z-index: 100;
        }
        .sidebar-logo {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .sidebar-logo img { height: 40px; width: auto; }
        .sidebar-label {
            font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em;
            text-transform: uppercase; color: rgba(255,255,255,0.35);
            padding: 24px 20px 8px;
        }
        .sidebar-nav { list-style: none; padding: 0 12px; flex: 1; }
        .sidebar-nav li a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 8px;
            color: rgba(255,255,255,0.65); text-decoration: none;
            font-size: 0.9rem; font-weight: 500;
            transition: all 0.2s;
        }
        .sidebar-nav li a:hover, .sidebar-nav li a.active {
            background: rgba(255,255,255,0.1); color: #fff;
        }
        .sidebar-nav li a i { width: 16px; text-align: center; }
        .sidebar-bottom {
            padding: 16px 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .btn-logout {
            display: flex; align-items: center; gap: 10px;
            width: 100%; padding: 10px 12px; border-radius: 8px;
            background: none; border: none; cursor: pointer;
            color: rgba(255,255,255,0.5); font-size: 0.88rem;
            font-family: 'Barlow', sans-serif; transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(255,0,0,0.1); color: #f87171; }

        /* Main */
        .main { margin-left: 240px; min-height: 100vh; }
        .topbar {
            background: white; padding: 16px 32px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(26,48,96,0.08);
            box-shadow: 0 1px 8px rgba(0,0,0,0.05);
        }
        .topbar h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.5rem; font-weight: 800;
            text-transform: uppercase; color: #1a3060;
        }
        .btn-new {
            display: inline-flex; align-items: center; gap: 8px;
            background: linear-gradient(135deg, #4d8ae8, #1a3060);
            color: white; text-decoration: none;
            padding: 10px 20px; border-radius: 7px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700; font-size: 0.9rem;
            letter-spacing: 0.05em; text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 3px 12px rgba(39,87,184,0.3);
        }
        .btn-new:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(39,87,184,0.4); }

        .content { padding: 32px; }

        /* Stats row */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card {
            background: white; border-radius: 12px; padding: 24px;
            border: 1px solid rgba(26,48,96,0.07);
        }
        .stat-card .num {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.4rem; font-weight: 900; color: #1a3060;
            line-height: 1;
        }
        .stat-card .lbl { font-size: 0.82rem; color: #8a9ab8; margin-top: 6px; }

        /* Posts table */
        .posts-wrap { background: white; border-radius: 14px; border: 1px solid rgba(26,48,96,0.07); overflow: hidden; }
        .posts-header {
            padding: 20px 24px; border-bottom: 1px solid rgba(26,48,96,0.07);
            display: flex; align-items: center; justify-content: space-between;
        }
        .posts-header h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem; font-weight: 700; text-transform: uppercase;
            color: #1a3060; letter-spacing: 0.04em;
        }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 12px 20px; text-align: left;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: #8a9ab8;
            background: #f8fafc;
            border-bottom: 1px solid rgba(26,48,96,0.07);
        }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: #f8fafc; }
        tbody tr + tr { border-top: 1px solid rgba(26,48,96,0.06); }
        td { padding: 16px 20px; font-size: 0.88rem; vertical-align: middle; }
        .post-title { font-weight: 600; color: #1a2540; }
        .post-slug { font-size: 0.78rem; color: #a0aec0; margin-top: 3px; }
        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 100px;
            font-size: 0.72rem; font-weight: 700;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: 0.06em; text-transform: uppercase;
        }
        .badge-published { background: #dcfce7; color: #16a34a; }
        .badge-draft     { background: #fef9c3; color: #a16207; }
        .actions { display: flex; gap: 8px; }
        .btn-edit, .btn-delete, .btn-toggle {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 12px; border-radius: 6px; border: none;
            font-size: 0.78rem; font-weight: 600; cursor: pointer;
            font-family: 'Barlow', sans-serif; transition: all 0.2s;
            text-decoration: none;
        }
        .btn-edit   { background: #eff6ff; color: #2757b8; }
        .btn-edit:hover { background: #dbeafe; }
        .btn-toggle { background: #f0fdf4; color: #16a34a; }
        .btn-toggle.unpublish { background: #fef9c3; color: #a16207; }
        .btn-toggle:hover { opacity: 0.8; }
        .btn-delete { background: #fef2f2; color: #dc2626; }
        .btn-delete:hover { background: #fee2e2; }
        .empty-state {
            text-align: center; padding: 60px 24px; color: #8a9ab8;
        }
        .empty-state i { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.4; display: block; }
        .loading { padding: 40px; text-align: center; color: #8a9ab8; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <img src="../ProTom.svg" alt="PROTOM">
    </div>
    <div class="sidebar-label">Beheer</div>
    <ul class="sidebar-nav">
        <li><a href="index.html" class="active"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
        <li><a href="editor.html"><i class="fa-solid fa-pen-to-square"></i> Nieuw artikel</a></li>
        <li><a href="../blog.html" target="_blank"><i class="fa-solid fa-globe"></i> Blog bekijken</a></li>
        <li><a href="/"><i class="fa-solid fa-house"></i> Naar de website</a></li>
    </ul>
    <div class="sidebar-bottom">
        <button class="btn-logout" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i> Uitloggen
        </button>
    </div>
</aside>

<!-- Main -->
<div class="main">
    <div class="topbar">
        <h1>Dashboard</h1>
        <a href="editor.html" class="btn-new"><i class="fa-solid fa-plus"></i> Nieuw artikel</a>
    </div>

    <div class="content">
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="num" id="statTotal">—</div>
                <div class="lbl">Totaal artikelen</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statPublished">—</div>
                <div class="lbl">Gepubliceerd</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statDraft">—</div>
                <div class="lbl">Concepten</div>
            </div>
        </div>

        <!-- Posts -->
        <div class="posts-wrap">
            <div class="posts-header">
                <h2>Alle artikelen</h2>
            </div>
            <div id="postsContainer">
                <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Laden...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createClient } = window.supabase;
    const sb = createClient(
        'https://hbzcgivqtgjuwyjguleq.supabase.co',
        'sb_publishable_mxWsNZyZieJeGFyev_Isvw_Tna758b_'
    );

    // Auth check
    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) { window.location.href = '/admin/login.html'; return; }
        loadPosts();
    }

    async function loadPosts() {
        const { data: posts, error } = await sb
            .from('blog_posts')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) { console.error(error); return; }

        // Stats
        document.getElementById('statTotal').textContent     = posts.length;
        document.getElementById('statPublished').textContent = posts.filter(p => p.published).length;
        document.getElementById('statDraft').textContent     = posts.filter(p => !p.published).length;

        // Table
        const container = document.getElementById('postsContainer');
        if (posts.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fa-regular fa-file-lines"></i><p>Nog geen artikelen. Maak je eerste artikel aan!</p></div>`;
            return;
        }

        container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Titel</th>
                        <th>Status</th>
                        <th>Datum</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="postsList"></tbody>
            </table>`;

        const tbody = document.getElementById('postsList');
        posts.forEach(post => {
            const date = new Date(post.created_at).toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric' });
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <div class="post-title">${escHtml(post.title)}</div>
                    <div class="post-slug">/${post.slug}</div>
                </td>
                <td>
                    <span class="badge ${post.published ? 'badge-published' : 'badge-draft'}">
                        ${post.published ? '● Gepubliceerd' : '○ Concept'}
                    </span>
                </td>
                <td>${date}</td>
                <td>
                    <div class="actions">
                        <a href="editor.html?id=${post.id}" class="btn-edit"><i class="fa-solid fa-pen"></i> Bewerken</a>
                        <button class="btn-toggle ${post.published ? 'unpublish' : ''}" onclick="togglePublish('${post.id}', ${post.published})">
                            <i class="fa-solid fa-${post.published ? 'eye-slash' : 'eye'}"></i>
                            ${post.published ? 'Verbergen' : 'Publiceren'}
                        </button>
                        <button class="btn-delete" onclick="deletePost('${post.id}', '${escHtml(post.title)}')">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </td>`;
            tbody.appendChild(tr);
        });
    }

    async function togglePublish(id, current) {
        await sb.from('blog_posts').update({ published: !current }).eq('id', id);
        loadPosts();
    }

    async function deletePost(id, title) {
        if (!confirm(`Weet je zeker dat je "${title}" wilt verwijderen?`)) return;
        await sb.from('blog_posts').delete().eq('id', id);
        loadPosts();
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await sb.auth.signOut();
        window.location.href = '/admin/login.html';
    });

    init();
</script>
</body>
</html>
