<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel — PROTOM</title>
    <link rel="icon" href="/ProTom.svg" type="image/svg+xml">
    <meta name="robots" content="index, follow">
    <!-- Google Analytics 4 — vervang G-XXXXXXXXXX met jouw Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XXXXXXXXXX');</script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Barlow', sans-serif; background: #f0f4fb; color: #1a2540; -webkit-font-smoothing: antialiased; }

        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(26,48,96,0.95);
            backdrop-filter: blur(14px);
            height: 72px; display: flex; align-items: center;
            padding: 0 32px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.15);
        }
        .nav-inner { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; align-items: center; justify-content: space-between; }
        .logo { display: flex; align-items: center; text-decoration: none; }
        .logo img { height: 44px; width: auto; }
        .nav-links { display: flex; gap: 32px; list-style: none; }
        .nav-links a { color: rgba(255,255,255,0.72); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover { color: #fff; }
        .btn-nav-cta { background: #fff; color: #1a3060; padding: 9px 22px; border-radius: 7px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.88rem; letter-spacing: 0.05em; text-transform: uppercase; text-decoration: none; transition: background 0.2s; white-space: nowrap; }
        .btn-nav-cta:hover { background: #e8eef8; }

        /* Hero */
        .post-hero {
            background: linear-gradient(135deg, #4d8ae8, #1a3060);
            padding: 72px 28px 64px;
        }
        .post-hero-inner { max-width: 800px; margin: 0 auto; }
        .back-link { display: inline-flex; align-items: center; gap: 7px; color: rgba(255,255,255,0.65); text-decoration: none; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; margin-bottom: 28px; transition: color 0.2s; }
        .back-link:hover { color: #fff; }
        .post-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
        .post-date-badge { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.88); padding: 4px 14px; border-radius: 100px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
        .post-hero h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: clamp(2rem, 5vw, 3.4rem); text-transform: uppercase; color: #fff; line-height: 1.05; margin-bottom: 16px; }
        .post-hero .excerpt { font-size: 1.05rem; color: rgba(255,255,255,0.72); line-height: 1.7; max-width: 620px; }

        /* Cover image */
        .cover-wrap { max-width: 900px; margin: -32px auto 0; padding: 0 28px; position: relative; z-index: 2; }
        .cover-wrap img { width: 100%; border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); display: block; max-height: 480px; object-fit: cover; }

        /* Article body */
        .article-wrap { max-width: 760px; margin: 0 auto; padding: 56px 28px 80px; }
        .article-body { background: white; border-radius: 16px; padding: 48px 52px; border: 1px solid rgba(26,48,96,0.07); box-shadow: 0 4px 24px rgba(0,0,0,0.04); }

        /* Prose styles */
        .article-body h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.7rem; text-transform: uppercase; color: #1a3060; margin: 32px 0 14px; }
        .article-body h3 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.3rem; text-transform: uppercase; color: #1a3060; margin: 24px 0 10px; }
        .article-body p { font-size: 0.95rem; line-height: 1.85; color: #3a4a6a; margin-bottom: 18px; }
        .article-body ul, .article-body ol { padding-left: 24px; margin-bottom: 18px; }
        .article-body li { font-size: 0.95rem; line-height: 1.8; color: #3a4a6a; margin-bottom: 6px; }
        .article-body blockquote { border-left: 4px solid #4d8ae8; padding: 14px 20px; background: #f0f4fb; border-radius: 0 8px 8px 0; margin: 24px 0; font-style: italic; color: #5a6a8a; }
        .article-body a { color: #2757b8; text-decoration: underline; }
        .article-body img { max-width: 100%; border-radius: 10px; margin: 16px 0; }
        .article-body strong { color: #1a3060; font-weight: 600; }

        /* CTA */
        .article-cta { margin-top: 48px; padding-top: 32px; border-top: 1px solid rgba(26,48,96,0.08); text-align: center; }
        .article-cta p { font-size: 0.9rem; color: #8a9ab8; margin-bottom: 16px; }
        .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #4d8ae8, #1a3060); color: white; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.95rem; letter-spacing: 0.06em; text-transform: uppercase; box-shadow: 0 4px 18px rgba(39,87,184,0.35); transition: transform 0.2s, box-shadow 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(39,87,184,0.5); }

        .loading-state { text-align: center; padding: 100px 24px; color: #8a9ab8; }
        .loading-state i { font-size: 2rem; display: block; margin-bottom: 14px; opacity: 0.4; }
        .error-state { text-align: center; padding: 100px 24px; color: #8a9ab8; }

        footer { background: #0d1a38; padding: 48px 32px; }
        .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
        .footer-logo img { height: 36px; width: auto; opacity: 0.75; }
        .footer-copy { color: rgba(255,255,255,0.32); font-size: 0.82rem; }
        .footer-copy a { color: rgba(255,255,255,0.32); text-decoration: none; }
        .footer-copy a:hover { color: rgba(255,255,255,0.6); }

        @media (max-width: 768px) {
            .article-body { padding: 28px 24px; }
            .nav-links { display: none; }
            .footer-inner { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="/" class="logo"><img src="ProTom.svg" alt="PROTOM"></a>
        <ul class="nav-links">
            <li><a href="index.html#producten">Producten</a></li>
            <li><a href="index.html#over">Over ons</a></li>
            <li><a href="index.html#sectoren">Sectoren</a></li>
            <li><a href="index.html#merken">Merken</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
        <a href="index.html#contact" class="btn-nav-cta">Offerte aanvragen</a>
    </div>
</nav>

<div id="pageContent">
    <div class="loading-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Artikel laden...</p></div>
</div>

<footer>
    <div class="footer-inner">
        <div class="footer-logo"><img src="ProTom.svg" alt="PROTOM"></div>
        <p class="footer-copy">© 2026 Protom. Alle rechten voorbehouden. — <a href="index.html">Terug naar de website</a></p>
    </div>
</footer>

<script>
    const { createClient } = window.supabase;
    const sb = createClient(
        'https://hbzcgivqtgjuwyjguleq.supabase.co',
        'sb_publishable_mxWsNZyZieJeGFyev_Isvw_Tna758b_'
    );

    async function loadPost() {
        const slug = new URLSearchParams(window.location.search).get('slug');
        if (!slug) { showError(); return; }

        const { data: post, error } = await sb
            .from('blog_posts')
            .select('*')
            .eq('slug', slug)
            .eq('published', true)
            .single();

        if (error || !post) { showError(); return; }

        document.title = post.title + ' — PROTOM Blog';

        const date = new Date(post.created_at).toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });

        document.getElementById('pageContent').innerHTML = `
            <div class="post-hero">
                <div class="post-hero-inner">
                    <a href="blog.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Terug naar blog</a>
                    <div class="post-meta">
                        <span class="post-date-badge">${date}</span>
                    </div>
                    <h1>${post.title}</h1>
                    ${post.excerpt ? `<p class="excerpt">${post.excerpt}</p>` : ''}
                </div>
            </div>
            ${post.cover_image ? `<div class="cover-wrap"><img src="${post.cover_image}" alt="${post.title}"></div>` : ''}
            <div class="article-wrap">
                <div class="article-body">
                    <div>${post.content || ''}</div>
                    <div class="article-cta">
                        <p>Meer weten of een offerte aanvragen?</p>
                        <a href="/#contact" class="btn-primary"><i class="fa-regular fa-envelope"></i> Neem contact op</a>
                    </div>
                </div>
            </div>`;
    }

    function showError() {
        document.getElementById('pageContent').innerHTML = `
            <div class="error-state" style="padding:120px 24px;">
                <i class="fa-regular fa-circle-xmark" style="font-size:2.5rem;display:block;margin-bottom:16px;opacity:0.4;"></i>
                <p style="margin-bottom:20px;">Artikel niet gevonden.</p>
                <a href="blog.html" style="color:#2757b8;font-weight:600;">← Terug naar blog</a>
            </div>`;
    }

    loadPost();
</script>
</body>
</html>
